<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arbitrage Viewer for Prediction Markets</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero card">
      <div class="hero-copy">
        <p class="eyebrow">Arbitrage Viewer for Prediction Markets</p>
        <h1>Highest ROI Dashboard</h1>
        <p class="subtitle">Track top ROI opportunities and compare market-side pricing.</p>
      </div>
      <div class="hero-stats">
        <div class="stat">
          <span>Top ROI Entries</span>
          <strong id="entryCount">0</strong>
        </div>
        <div class="stat">
          <span>Best ROI</span>
          <strong id="bestRoi">-</strong>
        </div>
      </div>
    </header>

    <section class="controls card">
      <div class="actions controls-actions">
        <button id="refreshButton" class="btn btn-secondary">Refresh ROI</button>
        <button id="lockButton" class="btn btn-primary">Lock Dashboard</button>
      </div>
      <p id="status" class="status">Dashboard ready.</p>
    </section>

    <main id="results" class="results"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
