<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arbitrage Viewer for Prediction Markets | Access</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell access-shell">
    <section class="card access-card">
      <p class="eyebrow">Arbitrage Viewer for Prediction Markets</p>
      <h1>Enter Access Code</h1>
      <p class="subtitle">Use your access code to open the dashboard.</p>
      <div class="field">
        <label for="accessCode">Access Code</label>
        <input id="accessCode" type="password" placeholder="Enter dashboard access code" autocomplete="off" />
      </div>
      <div class="actions">
        <button id="unlockButton" class="btn btn-primary">Open Dashboard</button>
      </div>
      <p id="status" class="status">Dashboard is locked.</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
