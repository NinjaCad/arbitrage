<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cross-Platform Price Scanner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero card">
      <div class="hero-copy">
        <p class="eyebrow">Prediction Hunt Style Scanner</p>
        <h1>Cross-Platform Arbitrage</h1>
        <p class="subtitle">Compare live pricing for the same event across prediction market platforms.</p>
      </div>
      <div class="hero-stats">
        <div class="stat">
          <span>Total Groups</span>
          <strong id="groupCount">0</strong>
        </div>
        <div class="stat">
          <span>Platforms Seen</span>
          <strong id="platformCount">0</strong>
        </div>
      </div>
    </header>

    <section class="controls card">
      <div class="field api-key-field">
        <label for="apiKey">API Key</label>
        <input id="apiKey" type="password" placeholder="Enter PredictionHunt API key" autocomplete="off" />
      </div>
      <div class="field topics-field">
        <label for="topics">Topics (comma separated)</label>
        <input id="topics" type="text" value="presidential election, fed interest rate, bitcoin" />
      </div>
      <div class="actions">
        <button id="scanButton" class="btn btn-primary">Scan Markets</button>
        <button id="refreshButton" class="btn btn-secondary">Refresh</button>
      </div>
      <p id="status" class="status">Ready to scan.</p>
    </section>

    <main id="results" class="results"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
